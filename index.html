<!DOCTYPE html>
<html lang="ms">

<head>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Poppins:wght@300;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <title>Sistem Gimik Himpunan Siswa</title>

    <style>
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            overflow: hidden;
        }

        /* background poster */
        #startScreen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("poster.PNG") center/cover no-repeat;

            filter: grayscale(100%) blur(8px) brightness(0.35) contrast(120%);
            transform: scale(1.1);

            z-index: -1;
        }

        #startScreen::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: url("poster.PNG") center/cover no-repeat;

            filter: grayscale(100%) contrast(200%) brightness(0.6);

            mix-blend-mode: screen;
            opacity: 0.1;

            animation: glitchBg 3s infinite;

            z-index: -1;
        }

        @keyframes glitchBg {

            0% {
                transform: translate(0, 0) scale(1.1);
            }

            20% {
                transform: translate(-5px, 3px) scale(1.1);
            }

            40% {
                transform: translate(5px, -3px) scale(1.1);
            }

            60% {
                transform: translate(-3px, 2px) scale(1.1);
            }

            80% {
                transform: translate(3px, -2px) scale(1.1);
            }

            100% {
                transform: translate(0, 0) scale(1.1);
            }

        }

        #startScreen h1 {
            color: cyan;
            margin-bottom: 40px;
        }

        #startScreen button {
            padding: 15px 40px;
            font-size: 22px;
            background: cyan;
            border: none;
            cursor: pointer;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: black;
        }

        body {
            font-family: 'Poppins';
            overflow: hidden;
            background: black;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            font-size: 60px;
        }

        .loader {
            margin-top: 30px;
            width: 70px;
            height: 70px;
            border: 4px solid rgba(0, 255, 255, 0.2);
            border-top: 4px solid cyan;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 15px cyan;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Text glow animation */

        .scene {
            display: none;
            font-size: 48px;
            line-height: 1.6;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #00ffff;
            }

            to {
                text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff;
            }
        }

        .active {
            display: block;
        }

        input {
            padding: 10px;
            font-size: 20px;
            text-align: center;
            background: black;
            border: 1px solid cyan;
            color: white;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 20px;
        }

        .progress {
            width: 500px;
            height: 30px;
            border: 2px solid cyan;
            margin: 40px auto 20px;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }

        #percent {
            font-size: 48px;
            color: cyan;
        }

        #scanBar {
            width: 0%;
            height: 100%;
            background: #00ff9f;
            box-shadow: 0 0 10px #00ff9f;
        }

        #scanPercent {
            font-size: 48px;
            color: #00ff9f;
        }

        #progressBar2 {
            width: 100%;
            height: 100%;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }

        .access-box {
            border: 3px solid #00ff9f;
            padding: 60px 100px;
            box-shadow: 0 0 30px #00ff9f;
            background: rgba(0, 0, 0, 0.6);
        }

        .checkmark {
            font-size: 120px;
            color: #00ff9f;
            margin-bottom: 10px;
            animation: pop 0.6s ease;
        }

        .access-box h1 {
            color: #00ff9f;
            font-size: 40px;
            margin: 10px 0;
        }

        .access-box p {
            color: #7dffce;
            font-size: 18px;
        }

        @keyframes glowBox {
            from {
                box-shadow: 0 0 10px #00ff9f;
            }

            to {
                box-shadow: 0 0 30px #00ff9f;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        .backBtn {
            margin-top: 40px;
            padding: 12px 30px;
            font-size: 18px;
            background: #00ff9f;
            border: none;
            color: black;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff9f;
            transition: 0.3s;
        }

        .backBtn:hover {
            box-shadow: 0 0 25px #00ff9f;
            transform: scale(1.05);
        }

        .startBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            background: transparent;
            border: 2px solid #00ffff;
            cursor: pointer;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 10px #ffffff;
            -webkit-text-stroke: 1px #000000;
        }

        /* Hover effect */
        .startBtn:hover {
            background: #ffffff;
            color: rgb(255, 255, 255);
            box-shadow:
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            transform: scale(1.08);
        }

        /* Click effect */
        .startBtn:active {
            transform: scale(0.95);
        }

        .loginBox {
            border: 3px solid cyan;
            padding: 60px 100px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 25px cyan;
        }

        .lockIcon {
            font-size: 68px;
            margin-bottom: 10px;
        }

        .loginBox h2 {
            color: cyan;
            margin: 10px 0;
        }

        .loginBox p {
            color: #9fffff;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .loginBox input {
            width: 320px;
            padding: 15px;
            font-size: 26px;
        }

        .enterBtn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            cursor: pointer;
            transition: 0.3s;
        }

        .enterBtn:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 20px cyan;
        }

        @keyframes glowBox {
            from {
                box-shadow: 0 0 10px cyan;
            }

            to {
                box-shadow: 0 0 30px cyan;
            }
        }

        #scene6 h1 {
            font-size: 80px;
        }

        #scene6 h2 {
            font-size: 55px;
        }

        #scene6 p {
            font-size: 30px;
        }

        #startScreen h1 {
            font-size: 60px;
        }

        .neonTitle {
            font-size: 70px;
            color: #00ffff;
            text-align: center;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from {
                text-shadow: 0 0 10px #00ffff;
            }

            to {
                text-shadow:
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff;
            }
        }

        .titleContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mainLogo {
            width: 360px;
            margin-bottom: 25px;
        }

        #hackerTerminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-family: monospace;
            color: #00ff9f;
            text-shadow: 0 0 10px #00ff9f;
            z-index: 3;
        }

        .posterFull {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        .posterBack {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 5;
            display: none;
        }

        .muteBtn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            padding: 12px 25px;
            font-size: 18px;
            background: #ff4444;
            border: none;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 10px #ff4444;
            transition: 0.3s;
            z-index: 6;
        }

        .muteBtn:hover {
            box-shadow: 0 0 25px #ff4444;
            transform: scale(1.05);
        }

        .titleMain {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: 6px;
            color: white;
            margin-bottom: 10px;
        }

        .titleSub {
            font-size: 50px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #d0d0d0;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div id="startScreen">

        <div class="titleContainer">

            <img src="main_logo.PNG" class="mainLogo">

            <h2 class="titleSub">
                PROGRAM HIMPUNAN SISWA
            </h2>

            <h2 class="titleSub">
                DUN WAKAF MEMPELAM 2026
            </h2>

        </div>

        <button class="startBtn" onclick="startSystem()">MULA</button>

    </div>

    <div id="scene1" class="scene active">
        MEMULAKAN SISTEM...<br>
        MENYAMBUNG KE PANGKALAN DATA...

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <div id="percent">0%</div>
    </div>

    <div id="scene2" class="scene">
        SAMBUNGAN BERJAYA<br>

        <div class="progress">
            <div id="progressBar2"></div>
        </div>

        <div id="percent2">100%</div>
    </div>

    <div id="scene3" class="scene">

        <div class="loginBox">

            <div class="lockIcon">🔒</div>

            <h2>SISTEM DIKUNCI</h2>

            <p style="font-size: 36px;">SILA MASUKKAN KATA LALUAN</p>

            <input type="password" id="password" placeholder="KATA LALUAN">

            <br>

            <button class="enterBtn" onclick="checkPassword()">ENTER</button>

        </div>

    </div>
    <div id="scene4" class="scene">
        MENGIMBAS IDENTITI...

        <div class="progress">
            <div id="scanBar"></div>
        </div>

        <div id="scanPercent">0%</div>
    </div>

    <div id="scene5" class="scene">

        <div class="access-box">

            <div class="checkmark">✔</div>

            <h1>ACCESS GRANTED</h1>

            <p>SISTEM KESELAMATAN DISAHKAN</p>

        </div>

    </div>

    <div id="scene6" class="scene">

        <div id="hackerTerminal">
            <p id="hackText"></p>
        </div>

        <img src="poster.PNG" class="posterFull" id="posterImage">

        <button onclick="toggleMute()" class="muteBtn" id="muteBtn">
            🔊 MUTE
        </button>

        <button onclick="location.reload()" class="backBtn posterBack">
            KEMBALI
        </button>

    </div>

    <audio id="imbas" src="mengimbas_identiti.wav" preload="auto"></audio>
    <audio id="access" src="akses_diluluskan.wav" preload="auto"></audio>
    <audio id="sambungan" src="sambugan_berjaya.wav" preload="auto"></audio>
    <audio id="load_bar" src="load_bar.mp3" preload="auto"></audio>
    <audio id="load_system" src="load_system.wav" preload="auto"></audio>
    <audio id="first_bgm" src="first_bg.mp3" loop preload="auto"></audio>
    <audio id="bgm" src="background.mp3" loop preload="auto"></audio>
    <audio id="voice" src="welcome.wav" preload="auto"></audio>
    <audio id="welcome_load" src="welcome_load.wav" preload="auto"></audio>

    <script src="script.js"></script>
</body>


</html>
